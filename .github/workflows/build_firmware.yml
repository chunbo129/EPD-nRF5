name: Build nRF52 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install GNU Arm Embedded Toolchain
      run: |
        curl -L -o gcc.tar.bz2 "https://developer.arm.com/-/media/Files/downloads/gnu-rm/9-2020q2/gcc-arm-none-eabi-9-2020-q2-update-x86_64-linux.tar.bz2"
        sudo mkdir -p /opt/gcc
        sudo tar -xjf gcc.tar.bz2 -C /opt/gcc --strip-components=1
        echo "/opt/gcc/bin" >> $GITHUB_PATH

    - name: Build nRF52 firmware
      run: |
        make -f Makefile.nrf52 GNU_INSTALL_ROOT="" GNU_PREFIX=arm-none-eabi

    - name: Build nRF51 firmware
      run: |
        make -f Makefile.nrf51 GNU_INSTALL_ROOT="" GNU_PREFIX=arm-none-eabi

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: epd_calendar_firmware
        path: |
          _build_nrf52/nrf52811_xxaa.hex
          _build_nrf51/nrf51822_xxaa.hex
