# GitHub Workflow for building nRF52 firmware and DFU package

name: Build nRF52 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi
        pip install nrfutil

    - name: Build nRF52 firmware
      run: |
        make -f Makefile.nrf52 GNU_INSTALL_ROOT="" GNU_PREFIX=arm-none-eabi VERBOSE=1

    - name: Generate DFU package
      run: |
        # S112 v7.3.0 (0x126), v7.2.0 (0x103), v7.0.1 (0xC4), v7.0.0 (0xB8), v6.1.1 (0xB0), v6.1.0 (0xAE)
        # Using 0xFFFE failed with error 7 (SD version failure), so we must list explicit IDs.
        nrfutil pkg generate --hw-version 52 --application-version 4 --application _build_nrf52/nrf52811_xxaa.hex --sd-req 0x126,0x103,0xC4,0xB8,0xB0,0xAE --key-file tools/priv.pem _build_nrf52/app_dfu_package.zip

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: epd_calendar_firmware
        path: |
          _build_nrf52/nrf52811_xxaa.hex
          _build_nrf52/app_dfu_package.zip
