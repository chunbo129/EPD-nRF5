name: Build nRF52 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install GNU Arm Embedded Toolchain
      uses: stephanos/setup-arm-toolchain@v1

    - name: Build nRF52 firmware
      run: |
        make -f Makefile.nrf52 GNU_INSTALL_ROOT="${{ env.ZEPHYR_SDK_INSTALL_DIR }}/arm-zephyr-eabi/bin/" GNU_PREFIX=arm-zephyr-eabi

    - name: Build nRF51 firmware
      run: |
        make -f Makefile.nrf51 GNU_INSTALL_ROOT="${{ env.ZEPHYR_SDK_INSTALL_DIR }}/arm-zephyr-eabi/bin/" GNU_PREFIX=arm-zephyr-eabi

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: epd_calendar_firmware
        path: |
          _build_nrf52/nrf52811_xxaa.hex
          _build_nrf51/nrf51822_xxaa.hex
